name: Deploy Wiki to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site/team _site/assets/icons _site/assets/css _site/assets/js
          cp *.html _site/
          cp team/*.html _site/team/
          cp assets/icons/* _site/assets/icons/
          cp assets/css/styles.css _site/assets/css/
          cp assets/js/sidebar.js _site/assets/js/
          cp manifest.webmanifest sw.js _site/
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g" _site/sw.js
          sed -i 's|assets/js/sidebar.js?v=[^"]*|assets/js/sidebar.js?v=${GITHUB_SHA}|g' _site/*.html _site/team/*.html
          if [ -d screenshots ]; then cp -r screenshots _site/; fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
