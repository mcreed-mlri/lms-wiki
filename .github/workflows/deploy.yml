name: Deploy Wiki to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp team-wiki.html _site/
          cp june-2026-priority-tasks.html _site/
          cp marlana.html _site/
          cp brightspace-interactive-guide.html _site/
          cp mlri-architecture.html _site/
          cp styles.css _site/
          cp sidebar.js _site/
          cp favicon.svg _site/
          cp icon.svg _site/
          cp icon-maskable.svg _site/
          cp manifest.webmanifest _site/
          cp sw.js _site/
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g" _site/sw.js
          sed -i "s/sidebar.js?v=[^\"]*/sidebar.js?v=${GITHUB_SHA}/g" _site/*.html
          if [ -d screenshots ]; then cp -r screenshots _site/; fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
